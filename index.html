<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Birthday Cake 🎂</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    #mainTitle {
      font-size: 32px;
      font-family: 'Pixelify Sans', sans-serif;
      margin-bottom: 8px;
    }

    #subTitle {
      font-size: 18px;
      font-family: 'Pixelify Sans', sans-serif;
      color: #555;
    }

    #debugPanel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: lime;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      z-index: 1000;
      max-width: 300px;
    }

    #audioLevelBar {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 5px;
    }

    #audioLevelFill {
      height: 100%;
      background: linear-gradient(90deg, green, yellow, red);
      width: 0%;
      transition: width 0.1s;
    }

    #micButton {
      position: fixed;
      top: 150px;
      left: 10px;
      padding: 15px 30px;
      font-size: 18px;
      font-family: 'Pixelify Sans', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
      z-index: 1000;
    }

      #micButton:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(102, 126, 234, 0.5);
      }

      #micButton.active {
        background: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
      }
  </style>
</head>

<body>
  <div id="debugPanel">
    <div><strong>🎤 Mikrofon Debug</strong></div>
    <div id="debugStatus">Warte auf Button...</div>
    <div id="audioLevelBar">
      <div id="audioLevelFill"></div>
    </div>
    <div id="debugVolume">Volume: 0</div>
    <div id="debugLowFreq">Low Freq: 0</div>
    <div id="debugDetection">Detection: 0/5</div>
  </div>

  <div class="container">
    <div id="birthdayText"></div>
    <button id="micButton">🎤 Mikrofon aktivieren</button>
    <div class="cake-container">
      <div class="cake" id="cake"></div>
    </div>
  </div>

  <script>
    // Read URL params
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "Sarah";
    let candleCount = parseInt(params.get("candles")) || 4;
    candleCount = Math.min(Math.max(candleCount, 1), 30);

    const birthdayText = document.getElementById("birthdayText");
    birthdayText.innerHTML = `
        <div id="mainTitle"><br>Happy Birthday, ${name}!</div>
        <div id="subTitle">Make a wish and blow the candles.</div>
      `;

    const cake = document.getElementById("cake");

    const colors = [
      "green-candle",
      "purple-candle",
      "blue-candle",
      "yellow-candle",
    ];
    const CAKE_VISUAL_WIDTH = 35;

    function createCandles(count) {
      cake.innerHTML = "";
      const CANDLE_VISUAL_WIDTH = 2;
      const availableWidth = CAKE_VISUAL_WIDTH;
      const candlesPerRow = 6;
      const rowCount = Math.ceil(count / candlesPerRow);
      const shiftAmount = 4;

      for (let i = 0; i < count; i++) {
        const candle = document.createElement("div");
        candle.classList.add("candle");
        const colorClass = colors[Math.floor(Math.random() * colors.length)];
        candle.classList.add(colorClass);

        const row = Math.floor(i / candlesPerRow);
        const col = i % candlesPerRow;
        const totalCandlesInRow = Math.min(
          candlesPerRow,
          count - row * candlesPerRow
        );
        const rowSpacing = availableWidth / (totalCandlesInRow + 1);

        const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
        const rowShift = row % 2 === 0 ? 0 : shiftAmount;

        candle.style.position = "absolute";
        candle.style.top = `${10 + row * 3}px`;
        candle.style.left = `${leftBase - rowShift + 4}px`;

        cake.appendChild(candle);
      }
    }

    createCandles(candleCount);

    // Debug elements
    const debugStatus = document.getElementById('debugStatus');
    const debugVolume = document.getElementById('debugVolume');
    const debugLowFreq = document.getElementById('debugLowFreq');
    const debugDetection = document.getElementById('debugDetection');
    const audioLevelFill = document.getElementById('audioLevelFill');
    const micButton = document.getElementById('micButton');

    let blown = false;

    // === Microphone / Blow Detection with Debug ===
    async function startMicDetection() {
      try {
        debugStatus.textContent = '⏳ Frage Mikrofon-Zugriff an...';
        micButton.disabled = true;

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: false, // Important for blow detection!
            autoGainControl: false
          }
        });

        debugStatus.textContent = '✅ Mikrofon aktiv! Puste jetzt!';
        micButton.textContent = '✅ Mikrofon läuft - Puste!';
        micButton.classList.add('active');

        const audioContext = new (window.AudioContext ||
          window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.3;

        source.connect(analyser);

        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        let detectionCounter = 0;

        function detectBlow() {
          if (blown) return;

          analyser.getByteFrequencyData(dataArray);

          // Calculate total volume
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) {
            sum += dataArray[i];
          }
          const average = sum / dataArray.length;

          // Calculate low frequency energy (blow sounds are low frequency)
          let lowFreqSum = 0;
          const lowFreqEnd = Math.floor(dataArray.length * 0.2);
          for (let i = 0; i < lowFreqEnd; i++) {
            lowFreqSum += dataArray[i];
          }
          const lowFreqAvg = lowFreqSum / lowFreqEnd;

          // Update debug display
          debugVolume.textContent = `Volume: ${average.toFixed(1)}`;
          debugLowFreq.textContent = `Low Freq: ${lowFreqAvg.toFixed(1)}`;
          audioLevelFill.style.width = `${Math.min(100, (average / 100) * 100)}%`;

          // Blow detection with VERY LOW thresholds for testing
          const VOLUME_THRESHOLD = 15;  // Very low!
          const LOW_FREQ_THRESHOLD = 20; // Very low!

          if (average > VOLUME_THRESHOLD && lowFreqAvg > LOW_FREQ_THRESHOLD) {
            detectionCounter++;
            debugDetection.textContent = `Detection: ${detectionCounter}/5 ⚠️`;
            debugDetection.style.color = 'yellow';

            // Need 5 consecutive frames to avoid false positives
            if (detectionCounter >= 5 && !blown) {
              blown = true;
              debugStatus.textContent = '🎉 ERKANNT! Kerzen gehen aus!';
              debugDetection.style.color = 'lime';
              blowOutCandles();
              stream.getTracks().forEach(track => track.stop());
              return;
            }
          } else {
            // Reset counter if sound drops
            if (detectionCounter > 0) {
              detectionCounter--;
              debugDetection.textContent = `Detection: ${detectionCounter}/5`;
            } else {
              debugDetection.textContent = `Detection: 0/5`;
              debugDetection.style.color = 'white';
            }
          }

          requestAnimationFrame(detectBlow);
        }

        detectBlow();
      } catch (err) {
        console.error("Mic access error:", err);
        debugStatus.textContent = '❌ Fehler: ' + err.message;
        micButton.disabled = false;
        micButton.textContent = '🎤 Nochmal versuchen';
        alert('Mikrofon-Zugriff verweigert!\n\nBitte erlaube Mikrofon-Zugriff in den Browser-Einstellungen:\n1. Chrome: Adressleiste → Schloss-Symbol → Berechtigungen\n2. Oder: chrome://settings/content/microphone');
      }
    }

    // Button click handler
    micButton.addEventListener('click', () => {
      if (!blown) {
        startMicDetection();
      }
    });

    function blowOutCandles() {
      const candles = document.querySelectorAll(".candle");
      candles.forEach((candle) => {
        const delay = Math.random() * 1000;
        setTimeout(() => {
          colors.forEach((color) => {
            if (candle.classList.contains(color)) {
              candle.classList.add("blown");
            }
          });
        }, delay);
      });

      // Update subTitle after short delay
      /*setTimeout(() => {
        const subTitle = document.getElementById("subTitle");
        subTitle.textContent = `<div>Yaaayyy! Ich hoffe du hast heute einen super Geburtstag, mit ganz viel Spaß und toller Gesellschaft.</div><div>Ich hab dich ganz arg lieb🎉</div>🎉`;
      }, 1200);*/

      setTimeout(() => {
        const subTitle = document.getElementById("subTitle");
        subTitle.textContent = `Yaaayyy! \nIch hoffe du hast heute einen super Geburtstag, mit ganz viel Spaß und toller Gesellschaft.`;

        setTimeout(() => {
          subTitle.innerHTML += `<br>Ich hab dich ganz arg lieb🎉`;
        }, 1000);
      }, 1200);
    }
  </script>
</body>

</html>
